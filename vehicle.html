<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Details Demo | KT Rentals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="min-h-full bg-slate-950 text-slate-100">
  <header class="border-b border-white/10 bg-slate-950/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl flex-col items-start gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
      <a href="./index.html" class="text-xl font-semibold tracking-wide text-white">KT Rentals</a>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-3 py-6 sm:px-6 sm:py-10 lg:px-8">
    <div class="grid gap-6 lg:grid-cols-[1fr_0.7fr]">
      <div class="overflow-hidden rounded-3xl border border-white/10 bg-slate-900 shadow-xl shadow-black/20">
        <img src="https://images.unsplash.com/photo-1553440569-bcc63803a83d?auto=format&fit=crop&w=1200&q=80" alt="Toyota RAV4" class="h-72 w-full object-cover" />
        <div class="p-5 sm:p-8">
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">SUV</p>
          <h1 class="mt-3 text-3xl font-semibold text-white">Toyota RAV4</h1>
          <p class="mt-3 text-slate-300">A premium, comfortable, and dependable crossover for city and highway travel.</p>
        </div>
        <div class="space-y-6 p-8">
          <div class="grid gap-4 sm:grid-cols-3">
            <div class="rounded-2xl border border-white/10 bg-slate-950/70 p-4">
              <p class="text-sm text-slate-400">Year</p>
              <p class="mt-1 font-semibold text-white">2022</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-950/70 p-4">
              <p class="text-sm text-slate-400">Transmission</p>
              <p class="mt-1 font-semibold text-white">Automatic</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-950/70 p-4">
              <p class="text-sm text-slate-400">Fuel</p>
              <p class="mt-1 font-semibold text-white">Petrol</p>
            </div>
          </div>
          <div class="rounded-2xl border border-white/10 bg-slate-950/70 p-6">
            <h2 class="text-xl font-semibold text-white">Pricing breakdown</h2>
            <div class="mt-4 flex items-center justify-between text-slate-300"><span>Daily rate</span><span>GHS 95</span></div>
            <div class="mt-2 flex items-center justify-between text-slate-300"><span>Premium support</span><span>Included</span></div>
          </div>
        </div>
      </div>

      <div class="rounded-3xl border border-white/10 bg-slate-900/80 p-5 shadow-xl shadow-black/20 sm:p-8">
        <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Book now</p>
        <h2 class="mt-3 text-2xl font-semibold text-white">Reserve your ride</h2>
        <form class="mt-6 space-y-4">
          <div>
            <label class="mb-2 block text-sm text-slate-300">Pick-up date</label>
            <input type="date" class="w-full rounded-xl border border-white/10 bg-slate-950 px-4 py-3 text-slate-100" />
          </div>
          <div>
            <label class="mb-2 block text-sm text-slate-300">Drop-off date</label>
            <input type="date" class="w-full rounded-xl border border-white/10 bg-slate-950 px-4 py-3 text-slate-100" />
          </div>
          <a href="./checkout.html" class="block w-full rounded-full bg-blue-600 px-4 py-3 text-center font-semibold text-white transition hover:bg-blue-700">Continue to Checkout</a>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
